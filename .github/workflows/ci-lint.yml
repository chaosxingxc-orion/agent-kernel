name: CI Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python lint dependencies
        run: python -m pip install --upgrade pip ruff pylint

      - name: Run Python lint gate
        run: python -m ruff check python_src python_tests && python -m pylint python_src python_tests
