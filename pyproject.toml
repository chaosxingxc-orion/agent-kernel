[tool.pytest.ini_options]
pythonpath = ["python_src"]
testpaths = ["python_tests"]

[tool.agent_kernel.style_policy]
python_style_guide = "https://google.github.io/styleguide/pyguide.html"
typescript_style_guide = "https://google.github.io/styleguide/tsguide.html"
enforcement = "strict"

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["python_src", "python_tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pylint.main]
py-version = "3.14"

[tool.pylint.format]
max-line-length = 100

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring",
  "too-many-instance-attributes",
  "too-few-public-methods",
  "unnecessary-ellipsis",
  "too-many-arguments",
  "too-many-positional-arguments",
  "no-member",
  "duplicate-code",
  "too-many-lines",
  "trailing-newlines",
]
